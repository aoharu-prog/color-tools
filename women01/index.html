<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女性向け LP デザインスタジオ</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Josefin+Sans:wght@100;300;400&family=DM+Serif+Display:ital@0;1&family=Libre+Baskerville:ital,wght@0,400;1,400&family=Jost:wght@200;300;400;500&family=Raleway:wght@200;300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 280px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

body {
  font-family: 'Jost', sans-serif;
  background: #0e0e0e;
  color: #fff;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ─── SIDEBAR ─── */
.sidebar {
  width: var(--sidebar-w);
  height: 100vh;
  overflow-y: auto;
  background: #111213;
  border-right: 1px solid #1f1f1f;
  flex-shrink: 0;
  padding: 20px 16px 48px;
  scrollbar-width: thin;
  scrollbar-color: #2a2a2a transparent;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

.sb-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 300;
  letter-spacing: 0.22em;
  color: #ccc;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid #1f1f1f;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sb-logo span { opacity: 0.5; font-size: 11px; }

.sb-section {
  font-size: 8.5px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #444;
  margin: 20px 0 10px;
}

/* Color swatches */
.color-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.cp {
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .2s, transform .2s;
  aspect-ratio: 5/3;
  position: relative;
}
.cp:hover { transform: scale(1.04); }
.cp.active { border-color: rgba(255,255,255,0.7); }
.cp-inner { display: flex; width: 100%; height: 100%; }
.cp-swatch { flex: 1; height: 100%; }
.cp-name {
  position: absolute;
  bottom: 5px; left: 0; right: 0;
  text-align: center;
  font-size: 8.5px;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 4px rgba(0,0,0,0.6);
}

/* Font list */
.font-list { display: flex; flex-direction: column; gap: 6px; }
.fp {
  padding: 10px 12px;
  background: #191a1b;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .2s, background .2s;
}
.fp:hover { background: #1f2021; }
.fp.active { border-color: rgba(255,255,255,0.5); }
.fp-text { font-size: 20px; line-height: 1.2; color: #e8e8e8; margin-bottom: 2px; }
.fp-meta { font-size: 8.5px; letter-spacing: 0.15em; color: #484848; }

/* Anim grid */
.anim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.ap {
  padding: 12px 8px;
  background: #191a1b;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  text-align: center;
  transition: border-color .2s, background .2s;
}
.ap:hover { background: #1f2021; }
.ap.active { border-color: rgba(255,255,255,0.5); }
.ap-icon { font-size: 18px; margin-bottom: 4px; }
.ap-name { font-size: 8px; letter-spacing: 0.1em; color: #888; text-transform: uppercase; }

.btn-refresh {
  width: 100%;
  margin-top: 24px;
  padding: 12px;
  background: transparent;
  border: 1px solid #2a2a2a;
  color: #888;
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 6px;
  transition: all .2s;
}
.btn-refresh:hover { background: #1a1a1a; color: #ccc; border-color: #444; }

.btn-copy-palette {
  width: 100%;
  margin-top: 8px;
  padding: 10px 12px;
  background: transparent;
  border: 1px solid #2a2a2a;
  color: #666;
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
  border-radius: 6px;
  transition: all .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-copy-palette:hover { background: #1a1a1a; color: #aaa; border-color: #3a3a3a; }
.btn-copy-palette.copied { border-color: #4a7a5a; color: #6aaa7a; background: rgba(74,122,90,0.08); }

/* ─── PREVIEW AREA ─── */
.preview-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #0a0a0a;
}

.preview-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}

.device-toggle {
  display: flex;
  background: #161616;
  border: 1px solid #222;
  border-radius: 6px;
  overflow: hidden;
}
.db {
  padding: 7px 16px;
  background: transparent;
  border: none;
  color: #555;
  font-family: 'Jost', sans-serif;
  font-size: 9px;
  letter-spacing: 0.15em;
  cursor: pointer;
  transition: all .2s;
}
.db.active { background: #242424; color: #ddd; }

.preview-label {
  font-size: 9px;
  letter-spacing: 0.2em;
  color: #333;
  text-transform: uppercase;
}

.frame-stage {
  flex: 1;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  transition: all .4s var(--ease);
}

.lp-frame {
  width: 100%;
  max-width: 920px;
  height: 100%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04);
  transition: max-width .5s var(--ease), border-radius .3s;
  position: relative;
}
.lp-frame.mobile {
  max-width: 390px;
  border-radius: 32px;
  box-shadow: 0 40px 100px rgba(0,0,0,0.8), 0 0 0 6px #1a1a1a, 0 0 0 7px #333;
}
.lp-frame.mobile::before {
  content: '';
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  width: 70px; height: 5px;
  background: #333;
  border-radius: 3px;
  z-index: 200;
}

.lp-scroll {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
}
.lp-scroll::-webkit-scrollbar { width: 3px; }
.lp-scroll::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }

/* ─── LP INTERNAL STYLES ─── */
.lp-wrap { font-size: 14px; }

/* LP sections inner container for desktop centering */
.lp-inner {
  max-width: 960px;
  margin: 0 auto;
  width: 100%;
}

/* Full-bleed sections still need inner container */
.lp-hero .lp-inner,
.lp-cta-band .lp-inner {
  position: relative;
  z-index: 1;
}

/* NAV */
.lp-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.lp-nav-logo { font-size: 14px; letter-spacing: 0.28em; font-weight: 300; }
.hamburger { width: 20px; height: 14px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
.hamburger span { display: block; height: 1px; background: currentColor; border-radius: 1px; }
.hamburger span:last-child { width: 70%; }

/* HERO */
.lp-hero {
  padding: 80px 24px 64px;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: stretch;
  position: relative;
  overflow: hidden;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  margin-bottom: 24px;
  padding: 6px 14px;
  border-radius: 20px;
}
.hero-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.hero-h1 {
  font-size: clamp(22px, 6vw, 58px);
  line-height: 1.15;
  font-weight: 400;
  margin-bottom: 20px;
  max-width: 540px;
}
.hero-h1 em { font-style: italic; }
@media (min-width: 600px) {
  .hero-h1 { font-size: clamp(34px, 7vw, 58px); }
}
.hero-p {
  font-size: 14px;
  line-height: 1.85;
  max-width: 400px;
  opacity: 0.72;
  margin-bottom: 36px;
}
.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
.btn-primary {
  padding: 13px 32px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: opacity .2s, transform .2s;
}
.btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-ghost {
  padding: 13px 24px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  font-family: inherit;
  transition: all .2s;
}
.hero-scroll {
  position: absolute;
  bottom: 32px;
  left: 24px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 9px;
  letter-spacing: 0.25em;
  opacity: 0.45;
}
.scroll-line { width: 32px; height: 1px; background: currentColor; }

/* TRUST BAR */
.trust-bar {
  padding: 18px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  overflow-x: auto;
}
.trust-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  min-width: 70px;
}
.trust-num { font-size: 20px; font-weight: 300; letter-spacing: -0.02em; }
.trust-label { font-size: 8.5px; letter-spacing: 0.12em; opacity: 0.6; text-transform: uppercase; white-space: nowrap; }
.trust-divider { width: 1px; height: 30px; opacity: 0.15; background: currentColor; flex-shrink: 0; }

/* INTRO / CONCEPT */
.lp-concept { padding: 64px 24px; }
.eyebrow { font-size: 9.5px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.55; margin-bottom: 14px; }
.section-h2 {
  font-size: clamp(18px, 4.5vw, 40px);
  font-weight: 400;
  line-height: 1.25;
  margin-bottom: 20px;
}
@media (min-width: 600px) {
  .section-h2 { font-size: clamp(24px, 5vw, 40px); }
}
.concept-body {
  font-size: 13.5px;
  line-height: 1.9;
  opacity: 0.75;
  max-width: 520px;
  margin-bottom: 28px;
}
.concept-img-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  border-radius: 8px;
  margin-top: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  position: relative;
  overflow: hidden;
}
.concept-img-placeholder::before {
  content: '';
  position: absolute;
  inset: 0;
  background: inherit;
  opacity: 0.3;
}

/* CAROUSEL */
.lp-carousel-section { padding: 56px 0 64px; }
.carousel-header { padding: 0 24px; margin-bottom: 28px; }
.carousel-track-wrap { overflow: hidden; position: relative; }
.carousel-track {
  display: flex;
  gap: 14px;
  padding: 0 24px 4px;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  cursor: grab;
  user-select: none;
  transition: none;
}
.carousel-track::-webkit-scrollbar { display: none; }
.carousel-track:active { cursor: grabbing; }
.carousel-card {
  flex-shrink: 0;
  width: calc(100vw - 80px);
  max-width: 260px;
  border-radius: 10px;
  overflow: hidden;
  scroll-snap-align: start;
  transition: transform .3s;
}
.carousel-card:hover { transform: translateY(-3px); }
.card-img {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  position: relative;
}
.card-body { padding: 16px; }
.card-tag { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.55; margin-bottom: 7px; }
.card-title { font-size: 16px; font-weight: 400; margin-bottom: 8px; line-height: 1.3; }
.card-desc { font-size: 12px; line-height: 1.75; opacity: 0.68; }
.carousel-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
  padding: 0 24px;
}
.cdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0.25;
  cursor: pointer;
  transition: all .25s;
  flex-shrink: 0;
}
.cdot.active { opacity: 1; width: 20px; border-radius: 3px; }

/* FEATURES */
.lp-features { padding: 56px 24px 64px; }
.features-list { display: flex; flex-direction: column; gap: 14px; margin-top: 32px; }
.feature-item {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 20px;
  border-radius: 10px;
}
.feature-num { font-size: 11px; letter-spacing: 0.12em; opacity: 0.4; padding-top: 2px; flex-shrink: 0; }
.feature-content {}
.feature-h { font-size: 16px; font-weight: 400; margin-bottom: 8px; }
.feature-p { font-size: 12.5px; line-height: 1.8; opacity: 0.7; }

/* STEPS */
.lp-steps { padding: 56px 24px 64px; }
.steps-list { display: flex; flex-direction: column; gap: 0; margin-top: 36px; }
.step-item {
  display: flex;
  gap: 20px;
  padding-bottom: 32px;
  position: relative;
}
.step-item:not(:last-child)::before {
  content: '';
  position: absolute;
  left: 16px;
  top: 32px;
  bottom: 0;
  width: 1px;
  background: currentColor;
  opacity: 0.15;
}
.step-circle {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  font-weight: 300;
}
.step-body {}
.step-h { font-size: 16px; font-weight: 400; margin-bottom: 8px; padding-top: 4px; }
.step-p { font-size: 12.5px; line-height: 1.8; opacity: 0.7; }

/* VOICE / TESTIMONIAL CAROUSEL */
.lp-voices { padding: 56px 0 64px; }
.voice-header { padding: 0 24px; margin-bottom: 28px; }
.voice-track-wrap { overflow: hidden; }
.voice-track {
  display: flex;
  gap: 14px;
  padding: 0 24px 4px;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  cursor: grab;
  user-select: none;
}
.voice-track::-webkit-scrollbar { display: none; }
.voice-track:active { cursor: grabbing; }
.voice-card {
  flex-shrink: 0;
  width: calc(100vw - 64px);
  max-width: 320px;
  border-radius: 12px;
  padding: 24px;
  scroll-snap-align: start;
}
.voice-stars { font-size: 12px; margin-bottom: 12px; letter-spacing: 2px; }
.voice-text { font-size: 13.5px; line-height: 1.85; opacity: 0.82; margin-bottom: 18px; font-style: italic; }
.voice-author { display: flex; align-items: center; gap: 10px; }
.voice-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.voice-name { font-size: 12px; font-weight: 400; }
.voice-meta { font-size: 10px; opacity: 0.5; margin-top: 2px; letter-spacing: 0.08em; }

/* PRICE */
.lp-price { padding: 56px 24px 64px; }
.price-cards { display: flex; flex-direction: column; gap: 14px; margin-top: 32px; }
.price-card {
  border-radius: 12px;
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
  transition: transform .2s, box-shadow .2s;
}
.price-card.popular {
  transform: scale(1.0);
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
}
.price-badge {
  position: absolute;
  top: 16px; right: 16px;
  font-size: 9px;
  letter-spacing: 0.15em;
  padding: 4px 10px;
  border-radius: 20px;
  text-transform: uppercase;
}
.price-plan { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.55; margin-bottom: 10px; }
.price-amount { font-size: 38px; font-weight: 300; line-height: 1; margin-bottom: 4px; }
.price-amount sup { font-size: 16px; vertical-align: top; margin-top: 6px; display: inline-block; }
.price-amount sub { font-size: 14px; opacity: 0.6; }
.price-desc { font-size: 12px; opacity: 0.65; margin-bottom: 20px; line-height: 1.7; }
.price-features { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.price-features li { font-size: 12.5px; display: flex; align-items: center; gap: 8px; opacity: 0.8; }
.price-features li::before { content: '✓'; font-size: 11px; flex-shrink: 0; }

/* FAQ / ACCORDION */
.lp-faq { padding: 56px 24px 64px; }
.faq-list { margin-top: 32px; border-top: 1px solid; }
.faq-item { border-bottom: 1px solid; }
.faq-q {
  width: 100%;
  padding: 18px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  font-size: 14px;
  line-height: 1.5;
  font-family: inherit;
  gap: 16px;
}
.faq-icon {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 13px;
  transition: transform .3s var(--ease);
}
.faq-item.open .faq-icon { transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height .4s var(--ease), padding .3s;
}
.faq-a-inner {
  padding-bottom: 18px;
  font-size: 13px;
  line-height: 1.85;
  opacity: 0.72;
}

/* CTA BAND */
.lp-cta-band {
  padding: 64px 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.cta-band-deco {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  pointer-events: none;
  opacity: 0.12;
}
.cta-band-eyebrow { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.65; margin-bottom: 16px; }
.cta-band-h { font-size: clamp(26px, 6vw, 44px); font-weight: 400; line-height: 1.2; margin-bottom: 14px; }
.cta-band-p { font-size: 13px; opacity: 0.7; margin-bottom: 32px; line-height: 1.75; max-width: 400px; margin-left: auto; margin-right: auto; }
.cta-band-actions { display: flex; flex-direction: column; gap: 10px; align-items: center; }
.btn-white {
  padding: 14px 36px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: opacity .2s, transform .2s;
  width: 100%;
  max-width: 280px;
}
.btn-white:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-outline-white {
  padding: 13px 36px;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  font-family: inherit;
  transition: all .2s;
  width: 100%;
  max-width: 280px;
}
.guarantee { font-size: 11px; opacity: 0.5; margin-top: 14px; letter-spacing: 0.08em; }

/* MEDIA / PRESS */
.lp-press { padding: 40px 24px; }
.press-label { text-align: center; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.4; margin-bottom: 20px; }
.press-logos { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px 28px; }
.press-logo { font-size: 13px; letter-spacing: 0.15em; opacity: 0.35; font-weight: 300; }

/* FOOTER */
.lp-footer {
  padding: 40px 24px 32px;
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.footer-brand { font-size: 16px; letter-spacing: 0.28em; font-weight: 300; }
.footer-desc { font-size: 12px; opacity: 0.55; line-height: 1.75; max-width: 280px; margin-top: 8px; }
.footer-links { display: flex; flex-wrap: wrap; gap: 6px 20px; }
.footer-link { font-size: 11px; letter-spacing: 0.12em; opacity: 0.5; text-decoration: none; color: inherit; }
.footer-bottom {
  border-top: 1px solid;
  padding-top: 16px;
  font-size: 10px;
  opacity: 0.35;
  letter-spacing: 0.08em;
  display: flex;
  justify-content: space-between;

/* ─── ANIMATIONS ─── */
@keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes bloom { from { opacity:0; transform:scale(0.88) rotate(-1.5deg); filter:blur(4px); } to { opacity:1; transform:scale(1) rotate(0); filter:blur(0); } }
@keyframes slideR { from { opacity:0; transform:translateX(-32px); } to { opacity:1; transform:translateX(0); } }
@keyframes shimmer { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
@keyframes float { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
@keyframes gradMove { 0%,100%{background-position:0% 50%;} 50%{background-position:100% 50%;} }

.anim-fadeup .hero-badge { animation: fadeUp .7s var(--ease) both; }
.anim-fadeup .hero-h1 { animation: fadeUp .75s var(--ease) .1s both; }
.anim-fadeup .hero-p { animation: fadeUp .75s var(--ease) .22s both; }
.anim-fadeup .hero-actions { animation: fadeUp .7s var(--ease) .34s both; }

.anim-bloom .hero-h1 { animation: bloom 1s var(--ease) both; }
.anim-bloom .hero-p { animation: bloom 1s var(--ease) .2s both; }
.anim-bloom .hero-actions { animation: bloom .9s var(--ease) .35s both; }
.anim-bloom .hero-badge { animation: fadeIn .6s ease both; }

.anim-slide .hero-badge { animation: slideR .65s var(--ease) both; }
.anim-slide .hero-h1 { animation: slideR .7s var(--ease) .12s both; }
.anim-slide .hero-p { animation: slideR .7s var(--ease) .24s both; }
.anim-slide .hero-actions { animation: slideR .65s var(--ease) .36s both; }

.anim-float .hero-h1 { animation: float 5s ease-in-out infinite; }
.anim-float .hero-p { animation: float 6s ease-in-out .5s infinite; }

.anim-shimmer .hero-h1 {
  background: linear-gradient(90deg, currentColor 0%, rgba(255,255,255,0.35) 50%, currentColor 100%);
  background-size: 250% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 3.5s linear infinite;
}

.lp-hero.anim-gradient {
  background-size: 220% 220% !important;
  animation: gradMove 9s ease infinite;
}

// ═══════════════════════════════
//  CAROUSEL LOGIC (scroll-snap)
// ═══════════════════════════════
function initCarousel(trackId, dotsId, count, C) {
  const track = document.getElementById(trackId);
  const dotsEl = document.getElementById(dotsId);
  if (!track || !dotsEl) return;

  let cur = 0;
  let autoTimer = null;

  // Create dots
  dotsEl.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'cdot' + (i===0?' active':'');
    d.onclick = () => scrollToCard(i);
    dotsEl.appendChild(d);
  }

  function scrollToCard(i) {
    cur = Math.max(0, Math.min(i, count-1));
    const cards = track.querySelectorAll('.carousel-card, .voice-card');
    if (!cards[cur]) return;
    const cardLeft = cards[cur].offsetLeft - 24; // subtract padding
    track.scrollTo({ left: cardLeft, behavior: 'smooth' });
    updateDots(cur);
  }

  function updateDots(idx) {
    dotsEl.querySelectorAll('.cdot').forEach((d,j) => d.classList.toggle('active', j===idx));
  }

  // Update dots on scroll
  track.addEventListener('scroll', () => {
    const cards = track.querySelectorAll('.carousel-card, .voice-card');
    let closest = 0, minDist = Infinity;
    cards.forEach((card, i) => {
      const dist = Math.abs(card.offsetLeft - 24 - track.scrollLeft);
      if (dist < minDist) { minDist = dist; closest = i; }
    });
    if (closest !== cur) { cur = closest; updateDots(cur); }
  }, { passive: true });

  // Drag to scroll (mouse)
  let isDragging = false, dragStartX = 0, dragStartScroll = 0;
  track.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.pageX;
    dragStartScroll = track.scrollLeft;
    track.style.scrollBehavior = 'auto';
  });
  track.addEventListener('mousemove', e => {
    if (!isDragging) return;
    e.preventDefault();
    track.scrollLeft = dragStartScroll - (e.pageX - dragStartX);
  });
  const stopDrag = () => {
    if (!isDragging) return;
    isDragging = false;
    track.style.scrollBehavior = '';
    // snap to nearest
    const cards = track.querySelectorAll('.carousel-card, .voice-card');
    let closest = 0, minDist = Infinity;
    cards.forEach((card, i) => {
      const dist = Math.abs(card.offsetLeft - 24 - track.scrollLeft);
      if (dist < minDist) { minDist = dist; closest = i; }
    });
    scrollToCard(closest);
  };
  track.addEventListener('mouseup', stopDrag);
  track.addEventListener('mouseleave', stopDrag);

  // Auto play
  function startAuto() {
    stopAuto();
    autoTimer = setInterval(() => scrollToCard((cur + 1) % count), 4500);
  }
  function stopAuto() { if (autoTimer) clearInterval(autoTimer); }
  startAuto();

  const section = track.closest('.lp-carousel-section, .lp-voices');
  section?.addEventListener('mouseenter', stopAuto);
  section?.addEventListener('mouseleave', startAuto);
  track.addEventListener('touchstart', stopAuto, { passive: true });
}

// ═══════════════════════════════
//  COPY PALETTE
// ═══════════════════════════════
function copyPalette() {
  const C = COLOR_PRESETS[ci];
  const text = [
    `/* ${C.name} */`,
    `--color-bg:         ${C.bg};`,
    `--color-text:       ${C.text};`,
    `--color-accent:     ${C.accent};`,
    `--color-accent-bg:  ${C.accentBg};`,
    `--color-accent-text:${C.accentText};`,
    `--color-card:       ${C.card};`,
    `--color-border:     ${C.cardBorder};`,
    `--color-deco-1:     ${C.deco1};`,
    `--color-deco-2:     ${C.deco2};`,
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('btnCopyPalette');
    const icon = document.getElementById('copyPaletteIcon');
    btn.classList.add('copied');
    btn.lastChild.textContent = ' コピーしました ✓';
    icon.textContent = '✓';
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.lastChild.textContent = ' カラーコードをコピー';
      icon.textContent = '⊞';
    }, 2200);
  });
}


function toggleFaq(btn) {
  const item = btn.closest('.faq-item');
  const answer = item.querySelector('.faq-a');
  const isOpen = item.classList.contains('open');

  // Close all
  document.querySelectorAll('.faq-item.open').forEach(el => {
    el.classList.remove('open');
    el.querySelector('.faq-a').style.maxHeight = '0';
  });

  if (!isOpen) {
    item.classList.add('open');
    answer.style.maxHeight = answer.scrollHeight + 40 + 'px';
  }
}
