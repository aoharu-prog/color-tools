<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Presets — Web Design Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --border: rgba(255,255,255,0.07);
  --text: #e8e8f0;
  --muted: #6b6b80;
  --accent: #c8b8ff;
}
body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }

header {
  padding: 20px 40px 18px;
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(24px);
  z-index: 100;
}
.header-inner { max-width: 1440px; margin: 0 auto; }
.header-top { display: flex; align-items: center; gap: 20px; margin-bottom: 13px; flex-wrap: wrap; }
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px; letter-spacing: -0.02em; color: #fff; flex-shrink: 0; }
.logo span { color: var(--accent); }
.result-count { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-left: auto; }

.filter-section { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filter-group { display: flex; gap: 3px; flex-wrap: wrap; }
.filter-btn {
  padding: 5px 12px; border: 1px solid var(--border);
  background: transparent; color: var(--muted);
  border-radius: 20px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.04em; transition: all 0.18s; white-space: nowrap;
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; }

.divider-v { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; align-self: center; }

.color-filters { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.color-dot {
  width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: all 0.18s; flex-shrink: 0; position: relative;
}
.color-dot:hover, .color-dot.active { transform: scale(1.3); border-color: rgba(255,255,255,0.55); }

.main { max-width: 1440px; margin: 0 auto; padding: 28px 40px 80px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px, 1fr)); gap: 13px; }

.card {
  border-radius: 13px; overflow: hidden;
  border: 1px solid var(--border); background: var(--surface);
  transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
  animation: fadeIn 0.35s ease both;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.card:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.14); box-shadow: 0 16px 50px rgba(0,0,0,0.5); }

.preview { height: 145px; position: relative; overflow: hidden; cursor: pointer; }
.preview-gradient { width: 100%; height: 100%; transition: transform 0.5s ease; }
.card:hover .preview-gradient { transform: scale(1.04); }
.preview-ui {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  justify-content: center; padding: 16px; opacity: 0; transition: opacity 0.25s;
}
.card:hover .preview-ui { opacity: 1; }
.ui-bar { height: 5px; border-radius: 3px; background: rgba(255,255,255,0.38); margin-bottom: 7px; }
.ui-bar:nth-child(2) { width: 55%; }
.ui-bar:nth-child(3) { width: 35%; background: rgba(255,255,255,0.18); }
.ui-btn { display: inline-block; margin-top: 10px; padding: 5px 13px; border-radius: 4px; background: rgba(255,255,255,0.22); font-size: 9px; color: rgba(255,255,255,0.9); backdrop-filter: blur(4px); }

.card-info { padding: 13px 15px 15px; }
.card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 5px; cursor: pointer; }
.card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; color: #fff; letter-spacing: -0.01em; line-height: 1.3; }
.card-tag { font-size: 9px; padding: 2px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0; margin-left: 8px; margin-top: 2px; }
.card-desc { font-size: 10px; color: var(--muted); line-height: 1.6; margin-bottom: 10px; }

/* Card swatches — clickable hex copy */
.swatches { display: flex; gap: 3px; margin-bottom: 10px; }
.swatch-wrap { flex: 1; position: relative; cursor: pointer; }
.swatch { height: 14px; border-radius: 6px; width: 100%; transition: transform 0.15s, filter 0.15s; }
.swatch-wrap:hover .swatch { transform: scaleY(1.6); filter: brightness(1.15); }
.swatch-tip {
  position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: var(--text); font-size: 9px; padding: 3px 7px;
  border-radius: 5px; white-space: nowrap; pointer-events: none;
  border: 1px solid var(--border); opacity: 0; transition: opacity 0.15s;
  font-family: 'DM Mono', monospace; z-index: 20; letter-spacing: 0.04em;
}
.swatch-wrap:hover .swatch-tip { opacity: 1; }

.css-row {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 10px; cursor: pointer; transition: background 0.18s;
}
.css-row:hover { background: rgba(255,255,255,0.06); }
.css-code { font-size: 9px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.copy-btn { font-size: 9px; color: var(--accent); flex-shrink: 0; letter-spacing: 0.05em; }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.82); backdrop-filter: blur(14px);
  z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 22px; width: 100%; max-width: 600px; overflow: hidden;
  animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.93) translateY(16px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-preview { height: 210px; }
.modal-body { padding: 22px 26px 26px; }
.modal-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 21px; color: #fff; margin-bottom: 3px; letter-spacing: -0.02em; }
.modal-category { font-size: 10px; color: var(--muted); margin-bottom: 18px; letter-spacing: 0.05em; }

.modal-swatches { display: flex; gap: 6px; margin-bottom: 18px; }
.modal-swatch-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; flex: 1; cursor: pointer; }
.modal-swatch {
  height: 44px; border-radius: 9px; width: 100%;
  transition: transform 0.18s, filter 0.18s; position: relative; overflow: hidden;
}
.modal-swatch::after {
  content: 'COPY'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-family: 'DM Mono', monospace; letter-spacing: 0.08em;
  color: rgba(255,255,255,0.95); opacity: 0; transition: opacity 0.15s;
  background: rgba(0,0,0,0.25); text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}
.modal-swatch-wrap:hover .modal-swatch { transform: scale(1.06); filter: brightness(1.1); }
.modal-swatch-wrap:hover .modal-swatch::after { opacity: 1; }
.modal-hex { font-size: 9px; color: var(--muted); letter-spacing: 0.04em; }

.modal-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 7px; }
.angle-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
.angle-btn {
  padding: 5px 10px; border: 1px solid var(--border); background: transparent;
  color: var(--muted); border-radius: 6px; cursor: pointer;
  font-family: 'DM Mono', monospace; font-size: 10px; transition: all 0.18s;
}
.angle-btn:hover, .angle-btn.active { border-color: var(--accent); color: var(--accent); }

.modal-css { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 11px 13px; margin-bottom: 14px; }
.modal-css pre { font-size: 11px; color: var(--accent); white-space: pre-wrap; word-break: break-all; line-height: 1.7; }
.modal-actions { display: flex; gap: 8px; }
.btn-primary { flex: 1; padding: 11px; background: var(--accent); color: #0a0a0f; border: none; border-radius: 9px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; letter-spacing: 0.05em; transition: opacity 0.18s; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { padding: 11px 18px; background: transparent; color: var(--text); border: 1px solid var(--border); border-radius: 9px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: border-color 0.18s; }
.btn-secondary:hover { border-color: rgba(255,255,255,0.3); }

.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--accent); color: #0a0a0f; padding: 9px 22px;
  border-radius: 22px; font-size: 11px; letter-spacing: 0.04em;
  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1), opacity 0.32s;
  z-index: 2000; opacity: 0; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 680px) {
  header, .main { padding-left: 16px; padding-right: 16px; }
  .modal-body { padding: 18px 20px 22px; }
}
</style>
</head>

let currentCat = 'all';
let currentColor = null;
let modalAngle = 135;
let currentPreset = null;

function buildGradient(preset, angle) {
  const c = preset.colors;
  if (preset.id === 32 || preset.id === 79) {
    return `linear-gradient(${angle}deg, ${c[0]}, ${c[1]}, ${c[2]}, ${c[3]})`;
  }
  return `linear-gradient(${angle}deg, ${c[0]}, ${c[c.length - 1]})`;
}

function buildCSS(preset, angle) {
  const c = preset.colors;
  let stops;
  if (preset.id === 32 || preset.id === 79) stops = c.join(', ');
  else stops = `${c[0]}, ${c[c.length - 1]}`;
  return `background: linear-gradient(${angle}deg, ${stops});`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let visible = 0;

  presets.forEach((p) => {
    const catOk = currentCat === 'all' || p.cat === currentCat;
    const colorOk = !currentColor || p.colorTags.includes(currentColor);
    if (!catOk || !colorOk) return;
    visible++;

    const grad = buildGradient(p, p.angle);
    const cssStr = buildCSS(p, p.angle);
    const delay = Math.min((visible - 1) * 0.022, 0.8);

    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${delay}s`;

    const swatchesHTML = p.colors.map(col =>
      `<div class="swatch-wrap" data-hex="${col}">
        <div class="swatch" style="background:${col}"></div>
        <div class="swatch-tip">${col}</div>
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="preview" data-open="true">
        <div class="preview-gradient" style="background:${grad}"></div>
        <div class="preview-ui">
          <div class="ui-bar"></div>
          <div class="ui-bar"></div>
          <div class="ui-bar"></div>
          <div class="ui-btn">BUTTON</div>
        </div>
      </div>
      <div class="card-info">
        <div class="card-header" data-open="true">
          <div class="card-name">${p.name}</div>
          <div class="card-tag">${p.tag}</div>
        </div>
        <div class="card-desc">${p.targets}</div>
        <div class="swatches">${swatchesHTML}</div>
        <div class="css-row" data-css="${cssStr.replace(/"/g,'&quot;')}">
          <div class="css-code">${cssStr}</div>
          <div class="copy-btn">COPY</div>
        </div>
      </div>`;

    // open modal
    card.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', () => openModal(p));
    });

    // swatch hex copy
    card.querySelectorAll('.swatch-wrap').forEach(sw => {
      sw.addEventListener('click', (e) => {
        e.stopPropagation();
        copyHex(sw.dataset.hex);
      });
    });

    // css copy
    card.querySelector('.css-row').addEventListener('click', (e) => {
      e.stopPropagation();
      const css = card.querySelector('.css-row').dataset.css;
      navigator.clipboard.writeText(css).then(() => showToast('CSS をコピーしました ✓'));
    });

    grid.appendChild(card);
  });

  document.getElementById('result-count').textContent = `${visible} PRESETS`;
}

function openModal(preset) {
  currentPreset = preset;
  modalAngle = preset.angle;
  updateModal();
  document.getElementById('modal').classList.add('open');
}

function updateModal() {
  const p = currentPreset;
  const grad = buildGradient(p, modalAngle);
  document.getElementById('modal-preview').style.background = grad;
  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-category').textContent = `${p.tag} — ${p.targets}`;

  document.getElementById('modal-swatches').innerHTML = p.colors.map(c => `
    <div class="modal-swatch-wrap" data-hex="${c}">
      <div class="modal-swatch" style="background:${c}"></div>
      <div class="modal-hex">${c}</div>
    </div>`).join('');

  document.querySelectorAll('.modal-swatch-wrap').forEach(sw => {
    sw.addEventListener('click', () => copyHex(sw.dataset.hex));
  });

  const angles = [0, 45, 90, 135, 150, 160, 180];
  document.getElementById('angle-row').innerHTML = angles.map(a =>
    `<button class="angle-btn ${a === modalAngle ? 'active' : ''}" onclick="setAngle(${a})">${a}°</button>`
  ).join('');

  document.getElementById('modal-css').textContent = buildCSS(p, modalAngle);
}

function setAngle(a) {
  modalAngle = a;
  updateModal();
}

function copyModalCSS() {
  navigator.clipboard.writeText(buildCSS(currentPreset, modalAngle)).then(() => showToast('CSS をコピーしました ✓'));
}

function copyHex(hex) {
  navigator.clipboard.writeText(hex).then(() => showToast(`${hex} をコピーしました ✓`));
}

function closeModalOverlay(e) {
  if (e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
});

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('category-filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('#category-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGrid();
});

document.getElementById('color-filters').addEventListener('click', e => {
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  if (dot.classList.contains('active')) {
    dot.classList.remove('active');
    currentColor = null;
  } else {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
    dot.classList.add('active');
    currentColor = dot.dataset.color;
  }
  renderGrid();
});

renderGrid();
</script>
