<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — Gold Gradient Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0905;
  --surface: #111008;
  --border: #2a2415;
  --border-gold: #5a4a1a;
  --gold-primary: #c9a84c;
  --gold-light: #e8c96e;
  --gold-pale: #f0d98a;
  --gold-dim: #8a6f2e;
  --text: #e8dfc8;
  --text-dim: #8a7d60;
  --text-muted: #4a4230;
  --radius: 10px;
  --radius-sm: 7px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  min-height: 100vh;
  overflow-x: hidden;
  font-size: 16px;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}
body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 60vw;
  height: 40vh;
  background: radial-gradient(ellipse, rgba(180,140,40,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.container {
  max-width: 1440px;
  margin: 0 auto;
  padding: 0 48px;
  position: relative;
  z-index: 1;
}

/* HEADER */
header {
  padding: 52px 0 44px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
}
header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 240px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
}
.logo-mark {
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
  margin-bottom: 18px;
  text-transform: uppercase;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(48px, 6vw, 78px);
  font-weight: 300;
  letter-spacing: 0.12em;
  background: linear-gradient(135deg, #c9a84c 0%, #f0d98a 40%, #c9a84c 65%, #a07830 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 14px;
}
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 17px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
}

/* CONTROLS */
.controls {
  padding: 48px 0 36px;
  display: flex;
  flex-direction: column;
  gap: 36px;
}
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.5em;
  color: var(--gold-dim);
  text-transform: uppercase;
  margin-bottom: 16px;
}

/* MOOD BUTTONS */
.mood-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.mood-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 11px 22px;
  font-family: 'Noto Serif JP', serif;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
  letter-spacing: 0.05em;
  border-radius: var(--radius);
}
.mood-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(201,168,76,0.06));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: var(--radius);
}
.mood-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }
.mood-btn:hover::before { opacity: 1; }
.mood-btn.active {
  border-color: var(--gold-primary);
  color: var(--gold-pale);
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 20px rgba(201,168,76,0.12), inset 0 0 20px rgba(201,168,76,0.04);
}

/* PATTERN BUTTONS */
.pattern-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.pattern-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 12px 16px;
  font-family: 'Noto Serif JP', serif;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  border-radius: var(--radius);
  min-width: 130px;
}
.pattern-btn .pat-preview {
  width: 100%;
  height: 16px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.04);
}
.pattern-btn .pat-name {
  font-size: 14px;
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.pattern-btn .pat-sub {
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-muted);
  white-space: nowrap;
}
.pattern-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }
.pattern-btn.active {
  border-color: var(--gold-primary);
  color: var(--gold-pale);
  background: rgba(201,168,76,0.08);
  box-shadow: 0 0 16px rgba(201,168,76,0.1);
}

/* DIRECTION */
.dir-row-wrap {
  display: flex;
  gap: 32px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.direction-row { display: flex; gap: 8px; }
.dir-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 9px 18px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: var(--radius-sm);
}
.dir-btn.active {
  border-color: var(--gold-primary);
  color: var(--gold-light);
  background: rgba(201,168,76,0.08);
}
.dir-btn:hover:not(.active) { border-color: var(--gold-dim); color: var(--gold-light); }

/* GRID HEADER */
.grid-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 0 20px;
  border-top: 1px solid var(--border);
}

/* GRADIENT GRID */
.gradient-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 18px;
  padding-bottom: 100px;
}
.gradient-card {
  position: relative;
  animation: fadeUp 0.4s ease both;
}
.gradient-card:nth-child(1){animation-delay:0.04s}
.gradient-card:nth-child(2){animation-delay:0.08s}
.gradient-card:nth-child(3){animation-delay:0.12s}
.gradient-card:nth-child(4){animation-delay:0.16s}
.gradient-card:nth-child(5){animation-delay:0.20s}
.gradient-card:nth-child(6){animation-delay:0.24s}
.gradient-card:nth-child(7){animation-delay:0.28s}
.gradient-card:nth-child(8){animation-delay:0.32s}
.gradient-card:nth-child(9){animation-delay:0.36s}
.gradient-card:nth-child(10){animation-delay:0.40s}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}
.gradient-preview {
  height: 190px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: all 0.4s ease;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.gradient-preview::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 55%, rgba(0,0,0,0.55) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}
.gradient-card:hover .gradient-preview {
  border-color: var(--gold-primary);
  transform: translateY(-5px);
  box-shadow: 0 14px 44px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,168,76,0.28);
}
.gradient-card:hover .gradient-preview::after { opacity: 1; }
.card-info { padding: 12px 2px 8px; }
.card-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-style: italic;
  color: var(--text-dim);
  margin-bottom: 10px;
  letter-spacing: 0.05em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-swatches { display: flex; gap: 4px; margin-bottom: 12px; }
.swatch {
  flex: 1;
  height: 22px;
  border-radius: 4px;
  position: relative;
  cursor: pointer;
  transition: transform 0.2s;
}
.swatch:hover { transform: scaleY(1.35); z-index: 2; }
.swatch-tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border-gold);
  color: var(--gold-light);
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  padding: 3px 9px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  border-radius: 4px;
}
.swatch:hover .swatch-tip { opacity: 1; }
.card-actions { display: flex; gap: 7px; }
.btn-small {
  flex: 1;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 8px 6px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  cursor: pointer;
  transition: all 0.3s;
  text-align: center;
  border-radius: var(--radius-sm);
}
.btn-small:hover { border-color: var(--gold-dim); color: var(--gold-light); background: rgba(201,168,76,0.06); }
.btn-small.copied { border-color: var(--gold-primary); color: var(--gold-primary); background: rgba(201,168,76,0.1); }

/* BOTTOM BAR */
.bulk-actions {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  border: 1px solid var(--border-gold);
  background: rgba(10,9,5,0.96);
  backdrop-filter: blur(20px);
  z-index: 100;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,168,76,0.08);
  border-radius: 16px;
  overflow: hidden;
}
.bulk-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  padding: 20px 56px;
  font-family: 'Cinzel', serif;
  font-size: 12px;
  letter-spacing: 0.3em;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  white-space: nowrap;
  position: relative;
  overflow: hidden;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.bulk-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.08), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}
.bulk-btn:hover { color: var(--gold-pale); }
.bulk-btn:hover::before { opacity: 1; }
.bulk-btn .btn-icon { font-size: 20px; line-height: 1; }

/* PANEL */
.panel-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.panel-overlay.open { opacity: 1; pointer-events: all; }
.panel {
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  width: min(500px, 100vw);
  background: #0c0b07;
  border-left: 1px solid var(--border-gold);
  z-index: 201;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  overflow-y: auto;
  padding: 44px 40px;
}
.panel.open { transform: translateX(0); }
.panel-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--gold-light);
  margin-bottom: 8px;
}
.panel-sub { font-size: 14px; color: var(--text-muted); font-style: italic; margin-bottom: 28px; }
.panel-close {
  position: absolute;
  top: 24px;
  right: 24px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 38px;
  height: 38px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
}
.panel-close:hover { border-color: var(--gold-dim); color: var(--gold-light); }
.code-block {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 20px;
  margin: 14px 0;
  position: relative;
  border-radius: var(--radius-sm);
}
.code-block pre {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: var(--gold-light);
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.9;
}
.code-copy-btn {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: 1px solid var(--border-gold);
  color: var(--gold-dim);
  padding: 5px 14px;
  font-family: 'Cinzel', serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  cursor: pointer;
  transition: all 0.2s;
  border-radius: var(--radius-sm);
}
.code-copy-btn:hover { color: var(--gold-light); border-color: var(--gold-primary); }
.panel-preview { height: 130px; margin-bottom: 28px; border: 1px solid var(--border); border-radius: var(--radius); }
.panel-section-title {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--gold-dim);
  margin: 28px 0 12px;
  text-transform: uppercase;
}

/* TOAST */
.toast {
  position: fixed;
  top: 32px;
  right: 32px;
  background: rgba(10,9,5,0.96);
  border: 1px solid var(--gold-primary);
  color: var(--gold-pale);
  padding: 13px 26px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  z-index: 300;
  opacity: 0;
  transform: translateY(-8px);
  transition: all 0.3s;
  box-shadow: 0 8px 32px rgba(201,168,76,0.15);
  border-radius: var(--radius);
}
.toast.show { opacity: 1; transform: translateY(0); }


@media (max-width: 1100px) { .gradient-grid { grid-template-columns: repeat(3,1fr); } }
@media (max-width: 700px) { .gradient-grid { grid-template-columns: repeat(2,1fr); } .container { padding: 0 20px; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-mark">Gold Gradient Studio</div>
    <h1>AURUM</h1>
    <p class="tagline">— 黄金のグラデーションを、あなたの手に —</p>
  </header>

  <div class="controls">
    <div>
      <div class="section-label">雰囲気</div>
      <div class="mood-grid" id="moodGrid">
        <button class="mood-btn active" data-mood="calm">落ち着いた</button>
        <button class="mood-btn" data-mood="mature">大人っぽい</button>
        <button class="mood-btn" data-mood="heavy">重厚</button>
        <button class="mood-btn" data-mood="luxury">高級感</button>
        <button class="mood-btn" data-mood="elegant">上品</button>
        <button class="mood-btn" data-mood="grace">優雅</button>
        <button class="mood-btn" data-mood="bright">明るい</button>
        <button class="mood-btn" data-mood="glamorous">ギラギラ</button>
        <button class="mood-btn" data-mood="gorgeous">華やか</button>
      </div>
    </div>

    <div>
      <div class="section-label">グラデーションパターン</div>
      <div class="pattern-row" id="patternGrid">
        <button class="pattern-btn" data-pattern="simple">
          <div class="pat-preview" id="prev-simple"></div>
          <span class="pat-name">シンプル</span>
          <span class="pat-sub">2点グラデーション</span>
        </button>
        <button class="pattern-btn active" data-pattern="sandwich">
          <div class="pat-preview" id="prev-sandwich"></div>
          <span class="pat-name">サンドイッチ</span>
          <span class="pat-sub">センターハイライト</span>
        </button>
        <button class="pattern-btn" data-pattern="metallic">
          <div class="pat-preview" id="prev-metallic"></div>
          <span class="pat-name">メタリック</span>
          <span class="pat-sub">多段反射型</span>
        </button>
        <button class="pattern-btn" data-pattern="offset">
          <div class="pat-preview" id="prev-offset"></div>
          <span class="pat-name">非対称</span>
          <span class="pat-sub">オフセット</span>
        </button>
      </div>
    </div>

    <div>
      <div class="section-label">方向</div>
      <div class="direction-row">
        <button class="dir-btn active" data-dir="to right">→ 横</button>
        <button class="dir-btn" data-dir="to bottom">↓ 縦</button>
        <button class="dir-btn" data-dir="135deg">↘ 斜め</button>
        <button class="dir-btn" data-dir="circle">◯ 円形</button>
      </div>
    </div>
  </div>

  <div class="grid-header">
    <div class="section-label" style="margin-bottom:0">
      グラデーション — <span id="currentMoodLabel" style="color:var(--gold-light)">落ち着いた</span>
    </div>
  </div>

  <div class="gradient-grid" id="gradientGrid"></div>
</div>

<div class="bulk-actions">
  <button class="bulk-btn" id="bulkSvgBtn">
    <span class="btn-icon">◈</span>
    SVG 一括出力
  </button>
</div>

<div class="panel-overlay" id="panelOverlay"></div>
<div class="panel" id="panel">
  <button class="panel-close" id="panelClose">✕</button>
  <div class="panel-title" id="panelTitle">Gradient Detail</div>
  <div class="panel-sub" id="panelSub">黄金のグラデーション</div>
  <div class="panel-preview" id="panelPreview"></div>

  <div class="panel-section-title">CSS GRADIENT</div>
  <div class="code-block">
    <pre id="cssPre"></pre>
    <button class="code-copy-btn" onclick="copyCode('cssPre')">COPY</button>
  </div>
  <div class="panel-section-title">CSS VARIABLE</div>
  <div class="code-block">
    <pre id="varPre"></pre>
    <button class="code-copy-btn" onclick="copyCode('varPre')">COPY</button>
  </div>
  <div class="panel-section-title">INLINE STYLE</div>
  <div class="code-block">
    <pre id="twPre"></pre>
    <button class="code-copy-btn" onclick="copyCode('twPre')">COPY</button>
  </div>
  <div class="panel-section-title">HEX VALUES</div>
  <div class="code-block">
    <pre id="hexPre"></pre>
    <button class="code-copy-btn" onclick="copyCode('hexPre')">COPY</button>
  </div>
</div>

<div class="toast" id="toast">COPIED</div>

<script>
const moodPalettes = {
  calm:      { label:'落ち着いた' },
  mature:    { label:'大人っぽい' },
  heavy:     { label:'重厚' },
  luxury:    { label:'高級感' },
  elegant:   { label:'上品' },
  grace:     { label:'優雅' },
  bright:    { label:'明るい' },
  glamorous: { label:'ギラギラ' },
  gorgeous:  { label:'華やか' },
};

const gradientNames = [
  'Sovereign Gold','Gilded Crown','Molten Luxury','Autumn Sovereign',
  'Imperial Shimmer','Royal Amber','Celestial Gold','Gilded Dawn',
  'Arcane Lustre','Sacred Flame'
];

// ─── COLOR MATH ───
function hexToHsl(hex) {
  let r=parseInt(hex.slice(1,3),16)/255;
  let g=parseInt(hex.slice(3,5),16)/255;
  let b=parseInt(hex.slice(5,7),16)/255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return [h*360,s*100,l*100];
}

function hslToHex(h,s,l){
  s=Math.max(0,Math.min(100,s))/100;
  l=Math.max(0,Math.min(100,l))/100;
  h=((h%360)+360)%360;
  const c=(1-Math.abs(2*l-1))*s;
  const x=c*(1-Math.abs((h/60)%2-1));
  const m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}
  else if(h<180){g=c;b=x;}else if(h<240){g=x;b=c;}
  else if(h<300){r=x;b=c;}else{r=c;b=x;}
  const toHex=v=>Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#'+toHex(r)+toHex(g)+toHex(b);
}

// ─── MOOD DEFINITIONS ───
// base: グラデーションのベースとなるHEX
// 各moodの特性に応じたdark/light明度オフセットとバリエーション
const moodDefs = {
  // 落ち着いた: #D4AF37ベース、色差小さく均質
  calm:      { base:'#D4AF37', dOff:-10, lOff:+12, sD:+3,  sL:-5,  v:[0,+1,-1,+2,-2,+1,-1,+2,-2,0]  },
  // 大人っぽい: やや暗め、ミッドトーン中心
  mature:    { base:'#C49A2A', dOff:-18, lOff:+16, sD:+4,  sL:-4,  v:[0,-2,+2,-3,+1,-1,+3,-4,+2,-2]  },
  // 重厚: 暗い深みのあるゴールド
  heavy:     { base:'#8B6914', dOff:-28, lOff:+8,  sD:+8,  sL:-3,  v:[0,-2,+2,-3,+1,-1,+3,-4,+2,-2]  },
  // 高級感: 深い暗→明るい輝き、ドラマチック
  luxury:    { base:'#B8860B', dOff:-30, lOff:+30, sD:+6,  sL:-6,  v:[0,+2,-2,+3,-1,+1,-3,+4,-2,+2]  },
  // 上品: ライト寄り、繊細
  elegant:   { base:'#D4AF37', dOff:-10, lOff:+22, sD:0,   sL:-8,  v:[0,+2,-2,+3,-1,+1,-3,+4,-2,+2]  },
  // 優雅: ソフトシャンパン系
  grace:     { base:'#C9A84C', dOff:-12, lOff:+20, sD:-2,  sL:-6,  v:[0,+1,-1,+2,-2,+1,-1,+3,-3,+1]  },
  // 明るい: SVG参考 #f0b200→#f8dd00→#fffac6 の温かみある明るいゴールド
  bright:    { base:'#f8dd00', dOff:-22, lOff:+16, sD:+15, sL:-20, v:[0,+1,-1,+2,-2,+1,-1,+2,-2,0]   },
  // ギラギラ: 高コントラスト
  glamorous: { base:'#D4AF37', dOff:-28, lOff:+28, sD:+8,  sL:-4,  v:[0,+2,-2,+3,-3,+1,-1,+4,-4,+2]  },
  // 華やか: オレンジ寄り温かみ
  gorgeous:  { base:'#CC8800', dOff:-22, lOff:+24, sD:+6,  sL:-4,  v:[0,+2,-2,+3,-1,+1,-3,+4,-2,+2]  },
};

// 雰囲気 → 10パターンのdark/lightペア生成
function generatePairs(moodKey) {
  // 「明るい」はSVGの実測値をそのまま使用: #f0b200(dark) / #fffac6(light)
  // バリエーションはdarkのhue/satを微妙にずらす
  if (moodKey === 'bright') {
    const darkBase  = '#f0b200';
    const lightBase = '#fffac6';
    const [dH, dS, dL] = hexToHsl(darkBase);
    const [lH, lS, lL] = hexToHsl(lightBase);
    const dVars = [0,+1,-1,+2,-2,+1,-1,+2,-2,0];
    return dVars.map(v => {
      const dark  = hslToHex(dH, Math.min(dS + v*0.5, 100), Math.max(dL + v, 4));
      const light = hslToHex(lH, Math.max(lS - v*0.3,   0), Math.min(lL + v*0.5, 95));
      return [dark, light];
    });
  }

  const def = moodDefs[moodKey];
  const [bH, bS, bL] = hexToHsl(def.base);
  return def.v.map(vOff => {
    const vL = bL + vOff;
    const darkL  = Math.max(vL + def.dOff,  4);
    const lightL = Math.min(vL + def.lOff, 95);
    const dark  = hslToHex(bH, Math.min(bS + def.sD, 100), darkL);
    const light = hslToHex(bH, Math.max(bS + def.sL,   0), lightL);
    return [dark, light];
  });
}

let currentMood = 'calm';
let currentPattern = 'sandwich';
let gradientDir = 'to right';
let currentGradients = [];
let activeCardIndex = -1;

// Build gradient stops from [dark, light] base
function buildStops(base, pattern) {
  const [dark, light] = base;
  switch(pattern) {
    case 'simple':
      return [{color:dark,pos:0},{color:light,pos:100}];
    case 'sandwich':
      return [{color:dark,pos:0},{color:light,pos:50},{color:dark,pos:100}];
    case 'metallic':
      return [
        {color:dark,pos:0},{color:light,pos:20},
        {color:dark,pos:45},{color:light,pos:70},{color:dark,pos:100}
      ];
    case 'offset':
      return [{color:dark,pos:0},{color:light,pos:22},{color:dark,pos:100}];
    default:
      return [{color:dark,pos:0},{color:light,pos:100}];
  }
}

function stopsToCSS(stops, dir) {
  const s = stops.map(s => `${s.color} ${s.pos}%`).join(', ');
  if (dir === 'circle') return `radial-gradient(circle at center, ${s})`;
  return `linear-gradient(${dir}, ${s})`;
}

function uniqueColors(stops) {
  const seen = new Set();
  return stops.filter(s => { if(seen.has(s.color)) return false; seen.add(s.color); return true; }).map(s => s.color);
}

function updatePatternPreviews() {
  const demo = ['#3a2200','#e8c000'];
  ['simple','sandwich','metallic','offset'].forEach(p => {
    const el = document.getElementById('prev-' + p);
    if (!el) return;
    el.style.background = stopsToCSS(buildStops(demo, p), 'to right');
  });
}

function render() {
  const grid = document.getElementById('gradientGrid');
  const pal = moodPalettes[currentMood];
  const pairs = generatePairs(currentMood);
  currentGradients = pairs.map((base, i) => ({
    base, stops: buildStops(base, currentPattern), name: gradientNames[i], index: i
  }));

  grid.innerHTML = '';
  currentGradients.forEach((g, i) => {
    const css = stopsToCSS(g.stops, gradientDir);
    const uc = uniqueColors(g.stops);
    const card = document.createElement('div');
    card.className = 'gradient-card';
    card.innerHTML = `
      <div class="gradient-preview" style="background:${css}" onclick="openPanel(${i})"></div>
      <div class="card-info">
        <div class="card-name">${g.name}</div>
        <div class="card-swatches">
          ${uc.map(c=>`<div class="swatch" style="background:${c}" onclick="copySingle('${c}')"><div class="swatch-tip">${c}</div></div>`).join('')}
        </div>
        <div class="card-actions">
          <button class="btn-small" onclick="copyCSS(${i},this)">CSS</button>
          <button class="btn-small" onclick="openPanel(${i})">詳細</button>
          <button class="btn-small" onclick="downloadOneSVG(${i})">SVG</button>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('currentMoodLabel').textContent = moodPalettes[currentMood].label;
  updatePatternPreviews();
}

function copyCSS(index, btn) {
  const css = stopsToCSS(currentGradients[index].stops, gradientDir);
  navigator.clipboard.writeText(`background: ${css};`);
  const orig = btn.textContent;
  btn.textContent = 'OK!';
  btn.classList.add('copied');
  showToast('CSS COPIED');
  setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
}

function copySingle(hex) {
  navigator.clipboard.writeText(hex);
  showToast(hex + ' COPIED');
}

function openPanel(index) {
  activeCardIndex = index;
  const g = currentGradients[index];
  const css = stopsToCSS(g.stops, gradientDir);

  document.getElementById('panelTitle').textContent = g.name;
  document.getElementById('panelSub').textContent =
    moodPalettes[currentMood].label + ' — ' + patternLabel(currentPattern);
  document.getElementById('panelPreview').style.background = css;

  document.getElementById('cssPre').textContent = `.element {\n  background: ${css};\n}`;
  document.getElementById('varPre').textContent = `:root {\n  --gradient-gold: ${css};\n}\n\n.element {\n  background: var(--gradient-gold);\n}`;
  document.getElementById('twPre').textContent = `style="background: ${css};"`;
  document.getElementById('hexPre').textContent = g.stops.map((s,i)=>`Stop ${i+1}: ${s.color}  @ ${s.pos}%`).join('\n');

  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function copyCode(preId) {
  navigator.clipboard.writeText(document.getElementById(preId).textContent);
  showToast('COPIED');
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

function patternLabel(p) {
  return {simple:'シンプル',sandwich:'サンドイッチ',metallic:'メタリック',offset:'非対称'}[p]||p;
}

function buildSVGDef(g, id, dir) {
  const stops = g.stops.map(s=>`<stop offset="${s.pos}%" stop-color="${s.color}"/>`).join('');
  if (dir === 'circle') return `<radialGradient id="${id}" cx="50%" cy="50%" r="50%">${stops}</radialGradient>`;
  const cm = {'to right':[0,0,1,0],'to bottom':[0,0,0,1],'135deg':[0,0,1,1]};
  const [x1,y1,x2,y2] = cm[dir]||[0,0,1,0];
  return `<linearGradient id="${id}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}">${stops}</linearGradient>`;
}

function triggerDownload(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content],{type}));
  a.download = filename;
  a.click();
}

function downloadOneSVG(index) {
  const g = currentGradients[index];
  const def = buildSVGDef(g, 'grd', gradientDir);
  const uc = uniqueColors(g.stops);
  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <defs>${def}</defs>
  <rect width="600" height="300" fill="url(#grd)"/>
  <text x="300" y="264" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="rgba(255,255,255,0.55)" font-style="italic">${g.name}</text>
  <text x="300" y="286" text-anchor="middle" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.35)">${uc.join(' · ')}</text>
</svg>`;
  triggerDownload(svg, `aurum-${currentMood}-${g.name.replace(/\s/g,'-').toLowerCase()}.svg`, 'image/svg+xml');
  showToast('SVG EXPORTED');
}

document.getElementById('bulkSvgBtn').addEventListener('click', () => {
  const cols=5, rows=2, cW=220, cH=250, pad=20, titleH=60;
  const W = cols*(cW+pad)+pad, H = titleH+rows*(cH+pad)+pad;
  const defs = currentGradients.map((g,i)=>buildSVGDef(g,`g${i}`,gradientDir)).join('\n');
  const rects = currentGradients.map((g,i)=>{
    const col=i%cols, row=Math.floor(i/cols);
    const x=pad+col*(cW+pad), y=titleH+pad+row*(cH+pad);
    const ph=cH-48;
    const uc=uniqueColors(g.stops);
    return `<rect x="${x}" y="${y}" width="${cW}" height="${ph}" fill="url(#g${i})" rx="4"/>
  <text x="${x+cW/2}" y="${y+ph+20}" text-anchor="middle" font-family="Georgia,serif" font-size="13" fill="#C9A84C" font-style="italic">${g.name}</text>
  <text x="${x+cW/2}" y="${y+ph+38}" text-anchor="middle" font-family="monospace" font-size="9" fill="#5a4a1a">${uc.join(' · ')}</text>`;
  }).join('\n');
  const mood = moodPalettes[currentMood].label;
  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
  <rect width="${W}" height="${H}" fill="#0a0905"/>
  <text x="${W/2}" y="36" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#C9A84C" letter-spacing="6">AURUM</text>
  <text x="${W/2}" y="54" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#5a4a1a" letter-spacing="4">${mood}  ·  ${patternLabel(currentPattern)}</text>
  <defs>${defs}</defs>
  ${rects}
</svg>`;
  triggerDownload(svg, `aurum-${currentMood}-${currentPattern}.svg`, 'image/svg+xml');
  showToast('10 GRADIENTS EXPORTED');
});

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2200);
}

document.getElementById('moodGrid').addEventListener('click', e => {
  const btn = e.target.closest('.mood-btn');
  if (!btn) return;
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentMood = btn.dataset.mood;
  render();
});

document.getElementById('patternGrid').addEventListener('click', e => {
  const btn = e.target.closest('.pattern-btn');
  if (!btn) return;
  document.querySelectorAll('.pattern-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentPattern = btn.dataset.pattern;
  render();
});

document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    gradientDir = btn.dataset.dir;
    if (activeCardIndex >= 0) {
      const g = currentGradients[activeCardIndex];
      document.getElementById('panelPreview').style.background = stopsToCSS(g.stops, gradientDir);
    }
    render();
  });
});

document.getElementById('panelClose').addEventListener('click', closePanel);
document.getElementById('panelOverlay').addEventListener('click', closePanel);

render();
</script>
