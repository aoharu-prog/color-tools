<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURUM — Gold Gradient Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0905;
  --surface: #111008;
  --border: rgba(200,160,60,0.15);
  --gold-text: #c8a03c;
  --gold-bright: #f0d060;
  --text: #e8dcc0;
  --text-muted: rgba(232,220,192,0.45);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Josefin Sans', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.6;
}

header {
  text-align: center;
  padding: 52px 24px 32px;
  border-bottom: 1px solid var(--border);
  position: relative;
}

header::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-text), transparent);
}

.logo {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: clamp(40px, 6vw, 72px);
  letter-spacing: 0.35em;
  background: linear-gradient(135deg, #8a6820 0%, #d4a832 25%, #f0d060 50%, #d4a832 75%, #8a6820 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.tagline {
  font-size: 10px;
  letter-spacing: 0.5em;
  color: var(--text-muted);
  margin-top: 8px;
  text-transform: uppercase;
}

.main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 24px 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 32px;
}

@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
}

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 28px;
  position: relative;
}

.panel-title {
  font-size: 9px;
  letter-spacing: 0.5em;
  color: var(--gold-text);
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.panel-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* Mood selector */
.mood-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

@media (max-width: 600px) {
  .mood-grid { grid-template-columns: repeat(2, 1fr); }
}

.mood-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.15em;
  padding: 12px 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.mood-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(200,160,60,0.08), transparent);
  opacity: 0;
  transition: opacity 0.2s;
}

.mood-btn:hover { border-color: rgba(200,160,60,0.4); color: var(--text); }
.mood-btn:hover::before { opacity: 1; }
.mood-btn.active {
  border-color: var(--gold-text);
  color: var(--gold-bright);
  background: rgba(200,160,60,0.08);
}

.mood-emoji { font-size: 16px; display: block; margin-bottom: 4px; }

/* Gold type selector */
.type-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.type-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.2em;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 14px;
}

.type-swatch {
  width: 32px;
  height: 14px;
  border-radius: 2px;
  flex-shrink: 0;
}

.type-btn:hover { border-color: rgba(200,160,60,0.4); color: var(--text); }
.type-btn.active { border-color: var(--gold-text); color: var(--gold-bright); background: rgba(200,160,60,0.08); }

/* Reflections */
.reflection-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.ref-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 11px;
  letter-spacing: 0.15em;
  padding: 10px 16px;
  cursor: pointer;
  transition: all 0.2s;
  min-width: 52px;
  text-align: center;
}
.ref-btn:hover { border-color: rgba(200,160,60,0.4); color: var(--text); }
.ref-btn.active { border-color: var(--gold-text); color: var(--gold-bright); background: rgba(200,160,60,0.08); }

/* Preview */
.preview-box {
  width: 100%;
  height: 160px;
  border-radius: 2px;
  margin-bottom: 20px;
  position: relative;
  overflow: hidden;
  transition: background 0.4s ease;
}

.preview-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  letter-spacing: 0.3em;
  color: rgba(255,255,255,0.85);
  text-shadow: 0 2px 12px rgba(0,0,0,0.5);
  mix-blend-mode: overlay;
}

/* Color stops display */
.stops-row {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.stop-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  padding: 5px 10px;
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
}
.stop-chip:hover { border-color: var(--gold-text); color: var(--text); }

.stop-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Angle control */
.angle-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 20px;
}

.angle-row label {
  font-size: 9px;
  letter-spacing: 0.3em;
  color: var(--text-muted);
  white-space: nowrap;
}

input[type=range] {
  flex: 1;
  -webkit-appearance: none;
  height: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold-text);
  cursor: pointer;
  border: 2px solid var(--bg);
}

.angle-val {
  font-size: 10px;
  color: var(--gold-text);
  min-width: 36px;
  text-align: right;
}

/* Direction selector */
.dir-row {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}

.dir-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 0.2em;
  padding: 8px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.dir-btn:hover { border-color: rgba(200,160,60,0.4); color: var(--text); }
.dir-btn.active { border-color: var(--gold-text); color: var(--gold-bright); background: rgba(200,160,60,0.08); }

/* Output buttons */
.output-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.out-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 9px;
  letter-spacing: 0.25em;
  padding: 14px 12px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.out-btn.primary {
  border-color: var(--gold-text);
  color: var(--gold-bright);
  grid-column: 1 / -1;
  background: rgba(200,160,60,0.06);
}

.out-btn:hover {
  background: rgba(200,160,60,0.1);
  border-color: var(--gold-text);
  color: var(--gold-bright);
}

.out-btn.copied {
  border-color: #4ade80;
  color: #4ade80;
}

/* CSS code output */
.code-box {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  padding: 16px;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  color: rgba(200,160,60,0.7);
  line-height: 1.8;
  word-break: break-all;
  margin-top: 16px;
  max-height: 120px;
  overflow-y: auto;
  letter-spacing: 0;
}

.code-box::-webkit-scrollbar { width: 4px; }
.code-box::-webkit-scrollbar-track { background: transparent; }
.code-box::-webkit-scrollbar-thumb { background: var(--border); }

/* Toast */
.toast {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(200,160,60,0.15);
  border: 1px solid var(--gold-text);
  color: var(--gold-bright);
  font-family: 'Josefin Sans', sans-serif;
  font-size: 10px;
  letter-spacing: 0.3em;
  padding: 12px 28px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 9999;
  pointer-events: none;
  text-transform: uppercase;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Divider */
.divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}
</style>
</head>
<body>

<header>
  <div class="logo">AURUM</div>
  <div class="tagline">Gold Gradient Studio — For Web & Illustrator</div>
</header>

<div class="main">

  <!-- LEFT PANEL: Controls -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <!-- Mood -->
    <div class="panel">
      <div class="panel-title">① 雰囲気を選択</div>
      <div class="mood-grid" id="moodGrid">
        <button class="mood-btn active" data-mood="glitter" onclick="setMood(this)"><span class="mood-emoji">✨</span>ギラギラ</button>
        <button class="mood-btn" data-mood="adult" onclick="setMood(this)"><span class="mood-emoji">🥃</span>大人っぽい</button>
        <button class="mood-btn" data-mood="calm" onclick="setMood(this)"><span class="mood-emoji">🍂</span>落ち着いた</button>
        <button class="mood-btn" data-mood="vivid" onclick="setMood(this)"><span class="mood-emoji">🌸</span>華やか</button>
        <button class="mood-btn" data-mood="heavy" onclick="setMood(this)"><span class="mood-emoji">⚓</span>重厚</button>
        <button class="mood-btn" data-mood="luxury" onclick="setMood(this)"><span class="mood-emoji">💎</span>高級感</button>
        <button class="mood-btn" data-mood="elegant" onclick="setMood(this)"><span class="mood-emoji">🌹</span>上品</button>
        <button class="mood-btn" data-mood="futuristic" onclick="setMood(this)"><span class="mood-emoji">🚀</span>近未来的</button>
        <button class="mood-btn" data-mood="graceful" onclick="setMood(this)"><span class="mood-emoji">🦢</span>優雅</button>
        <button class="mood-btn" data-mood="cool" onclick="setMood(this)"><span class="mood-emoji">❄️</span>涼しげ</button>
      </div>
    </div>

    <!-- Gold Type -->
    <div class="panel">
      <div class="panel-title">② ゴールドの種類</div>
      <div class="type-list">
        <button class="type-btn active" data-type="yellow" onclick="setType(this)">
          <div class="type-swatch" style="background:linear-gradient(90deg,#8a6820,#f0d060,#c8a03c)"></div>
          イエローゴールド
        </button>
        <button class="type-btn" data-type="champagne" onclick="setType(this)">
          <div class="type-swatch" style="background:linear-gradient(90deg,#b8a07a,#ede0c0,#c8b08a)"></div>
          シャンパンゴールド
        </button>
        <button class="type-btn" data-type="rose" onclick="setType(this)">
          <div class="type-swatch" style="background:linear-gradient(90deg,#a06055,#e8a898,#c07868)"></div>
          ピンクゴールド / ローズゴールド
        </button>
        <button class="type-btn" data-type="antique" onclick="setType(this)">
          <div class="type-swatch" style="background:linear-gradient(90deg,#5a3a1a,#c09050,#7a5028)"></div>
          アンティークゴールド / ブロンズ
        </button>
        <button class="type-btn" data-type="white" onclick="setType(this)">
          <div class="type-swatch" style="background:linear-gradient(90deg,#a0a8b0,#e8eef2,#b8c0c8)"></div>
          ホワイトゴールド
        </button>
      </div>
    </div>

    <!-- Reflections -->
    <div class="panel">
      <div class="panel-title">③ 反射回数</div>
      <div class="reflection-row">
        <button class="ref-btn active" data-ref="2" onclick="setRef(this)">2</button>
        <button class="ref-btn" data-ref="3" onclick="setRef(this)">3</button>
        <button class="ref-btn" data-ref="4" onclick="setRef(this)">4</button>
        <button class="ref-btn" data-ref="5" onclick="setRef(this)">5</button>
        <button class="ref-btn" data-ref="6" onclick="setRef(this)">6</button>
        <button class="ref-btn" data-ref="8" onclick="setRef(this)">8</button>
        <button class="ref-btn" data-ref="10" onclick="setRef(this)">10</button>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL: Preview + Output -->
  <div style="display:flex;flex-direction:column;gap:20px;">

    <div class="panel">
      <div class="panel-title">プレビュー</div>

      <!-- Direction -->
      <div class="dir-row">
        <button class="dir-btn active" data-dir="linear" onclick="setDir(this)">LINEAR</button>
        <button class="dir-btn" data-dir="radial" onclick="setDir(this)">RADIAL</button>
        <button class="dir-btn" data-dir="conic" onclick="setDir(this)">CONIC</button>
      </div>

      <!-- Angle (shown only for linear) -->
      <div class="angle-row" id="angleRow">
        <label>ANGLE</label>
        <input type="range" id="angleSlider" min="0" max="360" value="135" oninput="setAngle(this.value)">
        <span class="angle-val" id="angleVal">135°</span>
      </div>

      <div class="preview-box" id="previewBox">
        <div class="preview-text">GOLD</div>
      </div>

      <div class="stops-row" id="stopsRow"></div>

      <div class="code-box" id="codeBox"></div>
    </div>

    <div class="panel">
      <div class="panel-title">出力 / エクスポート</div>
      <div class="output-grid">
        <button class="out-btn primary" onclick="copyCSS()">CSS コードをコピー</button>
        <button class="out-btn" onclick="copyHex()">HEX 一括コピー</button>
        <button class="out-btn" onclick="downloadSVG()">SVG ダウンロード<br><span style="font-size:8px;opacity:0.5">Illustratorに配置可</span></button>
        <button class="out-btn" onclick="downloadASE()">ASE スウォッチ<br><span style="font-size:8px;opacity:0.5">Illustrator用</span></button>
      </div>
      <div class="divider"></div>
      <div style="font-size:9px;color:var(--text-muted);line-height:1.9;letter-spacing:0.1em;">
        <strong style="color:var(--gold-text)">SVGの使い方</strong><br>
        IllustratorでSVGを開き → スウォッチパネルに矩形をD&D<br><br>
        <strong style="color:var(--gold-text)">ASEスウォッチの使い方</strong><br>
        スウォッチパネル → メニュー → 読み込み でASEファイルを選択
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========================
// DATA
// ========================

// Base color stops per gold type
const goldTypes = {
  yellow: {
    dark:    ['#3d2800', '#6a4410', '#8a5e18'],
    mid:     ['#c8a03c', '#d4a832', '#e8c060'],
    bright:  ['#f0d060', '#fce080', '#fffaaa'],
    shadow:  ['#7a5010', '#5c3a08', '#2a1800'],
  },
  champagne: {
    dark:    ['#5c4a30', '#7a6045', '#8a7050'],
    mid:     ['#c8b08a', '#d8c09a', '#e8d0aa'],
    bright:  ['#f0e8d0', '#faf4e8', '#ffffff'],
    shadow:  ['#8a7055', '#6a5038', '#3a2818'],
  },
  rose: {
    dark:    ['#4a2018', '#6a3028', '#804038'],
    mid:     ['#c07868', '#d08878', '#e09888'],
    bright:  ['#f0b8a8', '#fcd8c8', '#ffe8e0'],
    shadow:  ['#7a4030', '#5a2820', '#3a1810'],
  },
  antique: {
    dark:    ['#1a0e05', '#2c1a08', '#3c2410'],
    mid:     ['#7a5028', '#9a6838', '#b07848'],
    bright:  ['#c8904a', '#d8a058', '#e8b868'],
    shadow:  ['#5a3818', '#3a2208', '#1e1005'],
  },
  white: {
    dark:    ['#5a6068', '#6a7080', '#788090'],
    mid:     ['#b0b8c8', '#c0c8d8', '#d0d8e8'],
    bright:  ['#e8eef8', '#f4f8ff', '#ffffff'],
    shadow:  ['#707880', '#585f68', '#404850'],
  }
};

// Mood modifiers: influence which stops get used and saturation
const moods = {
  glitter:   { stops: 'maxBright', sat: 1.2, contrast: 1.3, label: 'Pure Gold Glitter' },
  adult:     { stops: 'dark',      sat: 0.7, contrast: 0.9, label: 'Sophisticated' },
  calm:      { stops: 'shadow',    sat: 0.6, contrast: 0.8, label: 'Calm & Muted' },
  vivid:     { stops: 'vivid',     sat: 1.3, contrast: 1.2, label: 'Vivid & Vibrant' },
  heavy:     { stops: 'heavy',     sat: 0.8, contrast: 1.4, label: 'Heavy & Deep' },
  luxury:    { stops: 'luxury',    sat: 1.0, contrast: 1.1, label: 'Luxurious' },
  elegant:   { stops: 'elegant',   sat: 0.85,contrast: 1.0, label: 'Elegant' },
  futuristic:{ stops: 'future',    sat: 0.6, contrast: 1.5, label: 'Near-Future' },
  graceful:  { stops: 'graceful',  sat: 0.9, contrast: 0.95,label: 'Graceful' },
  cool:      { stops: 'cool',      sat: 0.5, contrast: 0.85,label: 'Cool & Icy' },
};

// ========================
// STATE
// ========================
let state = {
  mood: 'glitter',
  type: 'yellow',
  reflections: 2,
  angle: 135,
  direction: 'linear',
};

// ========================
// GRADIENT GENERATION
// ========================
function generateStops(type, mood, reflections) {
  const t = goldTypes[type];
  const m = moods[mood];

  // Build base palette based on mood
  let palette;
  switch(m.stops) {
    case 'maxBright':
      palette = [t.shadow[2], t.mid[0], t.bright[2], t.mid[2], t.bright[0], t.mid[1]];
      break;
    case 'dark':
      palette = [t.dark[0], t.mid[0], t.dark[2], t.mid[1], t.dark[1]];
      break;
    case 'shadow':
      palette = [t.shadow[0], t.dark[2], t.mid[0], t.dark[1], t.shadow[2]];
      break;
    case 'vivid':
      palette = [t.mid[1], t.bright[2], t.mid[2], t.bright[0], t.mid[0], t.bright[1]];
      break;
    case 'heavy':
      palette = [t.dark[0], t.shadow[0], t.mid[0], t.dark[2], t.shadow[2], t.dark[1]];
      break;
    case 'luxury':
      palette = [t.dark[1], t.mid[0], t.bright[1], t.mid[2], t.dark[2], t.bright[0]];
      break;
    case 'elegant':
      palette = [t.shadow[1], t.mid[0], t.bright[0], t.mid[1], t.shadow[2], t.bright[1]];
      break;
    case 'future':
      palette = [t.dark[0], t.mid[0], t.bright[2], t.dark[2], t.bright[0], t.dark[1]];
      break;
    case 'graceful':
      palette = [t.mid[0], t.bright[0], t.mid[2], t.bright[1], t.mid[1], t.bright[2]];
      break;
    case 'cool':
      // Mix with blue-ish tint
      palette = [t.shadow[1], t.dark[1], t.mid[0], t.dark[0], t.shadow[0]];
      break;
    default:
      palette = [t.dark[0], t.mid[0], t.bright[1], t.mid[2], t.shadow[1]];
  }

  // Build reflection sequence
  const stops = [];
  const baseCount = palette.length;

  for(let r = 0; r < reflections; r++) {
    const reversed = r % 2 === 1;
    for(let i = 0; i < baseCount; i++) {
      const idx = reversed ? (baseCount - 1 - i) : i;
      // Apply cool tint for 'cool' mood
      let hex = palette[idx];
      if(mood === 'cool') hex = addBlueTint(hex, 0.15);
      if(mood === 'futuristic') hex = addBlueTint(hex, 0.08);
      stops.push(hex);
    }
  }

  // Normalize to avoid too many stops
  const maxStops = 16;
  if(stops.length > maxStops) {
    const reduced = [];
    const step = (stops.length - 1) / (maxStops - 1);
    for(let i = 0; i < maxStops; i++) {
      reduced.push(stops[Math.round(i * step)]);
    }
    return reduced;
  }
  return stops;
}

function addBlueTint(hex, amount) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const nr = Math.round(r * (1 - amount));
  const ng = Math.round(g * (1 - amount * 0.5));
  const nb = Math.min(255, Math.round(b + (255 - b) * amount * 0.6));
  return '#' + [nr,ng,nb].map(v => v.toString(16).padStart(2,'0')).join('');
}

function buildGradientCSS(stops, direction, angle) {
  const stopsStr = stops.map((c, i) => `${c} ${Math.round(i / (stops.length-1) * 100)}%`).join(', ');
  if(direction === 'linear') return `linear-gradient(${angle}deg, ${stopsStr})`;
  if(direction === 'radial') return `radial-gradient(ellipse at center, ${stopsStr})`;
  if(direction === 'conic') return `conic-gradient(from ${angle}deg, ${stopsStr})`;
}

// ========================
// RENDER
// ========================
function render() {
  const stops = generateStops(state.type, state.mood, state.reflections);
  const css = buildGradientCSS(stops, state.direction, state.angle);

  document.getElementById('previewBox').style.background = css;

  // Stops chips
  const row = document.getElementById('stopsRow');
  row.innerHTML = '';
  // Show subset
  const show = stops.length <= 8 ? stops : stops.filter((_,i) => i % Math.ceil(stops.length/8) === 0);
  show.forEach(hex => {
    const chip = document.createElement('div');
    chip.className = 'stop-chip';
    chip.title = 'クリックでコピー';
    chip.innerHTML = `<div class="stop-dot" style="background:${hex}"></div>${hex}`;
    chip.onclick = () => copyText(hex, hex + ' をコピーしました');
    row.appendChild(chip);
  });

  // Code box
  const fullCSS = `.gold-gradient {\n  background: ${css};\n}`;
  document.getElementById('codeBox').textContent = fullCSS;

  // Angle row visibility
  document.getElementById('angleRow').style.display = state.direction === 'radial' ? 'none' : 'flex';
}

// ========================
// SETTERS
// ========================
function setMood(el) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.mood = el.dataset.mood;
  render();
}

function setType(el) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.type = el.dataset.type;
  render();
}

function setRef(el) {
  document.querySelectorAll('.ref-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.reflections = parseInt(el.dataset.ref);
  render();
}

function setDir(el) {
  document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  state.direction = el.dataset.dir;
  render();
}

function setAngle(val) {
  state.angle = parseInt(val);
  document.getElementById('angleVal').textContent = val + '°';
  render();
}

// ========================
// COPY / EXPORT
// ========================
function copyText(text, msg) {
  navigator.clipboard.writeText(text).then(() => showToast(msg || 'コピーしました'));
}

function copyCSS() {
  const stops = generateStops(state.type, state.mood, state.reflections);
  const css = buildGradientCSS(stops, state.direction, state.angle);
  const fullCSS = `.gold-gradient {\n  background: ${css};\n}`;
  copyText(fullCSS, 'CSS をコピーしました');
}

function copyHex() {
  const stops = generateStops(state.type, state.mood, state.reflections);
  copyText(stops.join(', '), 'HEX カラーをコピーしました');
}

function downloadSVG() {
  const stops = generateStops(state.type, state.mood, state.reflections);
  const id = 'goldGrad';
  let stopsXML = stops.map((c,i) =>
    `<stop offset="${(i/(stops.length-1)*100).toFixed(1)}%" stop-color="${c}"/>`
  ).join('\n    ');

  const gradDef = state.direction === 'radial'
    ? `<radialGradient id="${id}" cx="50%" cy="50%" r="50%">\n    ${stopsXML}\n  </radialGradient>`
    : `<linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="0%" gradientTransform="rotate(${state.angle - 90},0.5,0.5)">\n    ${stopsXML}\n  </linearGradient>`;

  const moodLabel = moods[state.mood].label;
  const typeLabel = document.querySelector('.type-btn.active').textContent.trim();

  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    ${gradDef}
  </defs>
  <!-- Gold Gradient: ${moodLabel} / ${typeLabel} / Reflections: ${state.reflections} -->
  <rect x="0" y="0" width="800" height="200" fill="url(#${id})"/>
</svg>`;

  download('gold-gradient.svg', svg, 'image/svg+xml');
  showToast('SVG をダウンロードしました — Illustratorで開けます');
}

function downloadASE() {
  const stops = generateStops(state.type, state.mood, state.reflections);

  // Build ASE binary
  // ASE format: Adobe Swatch Exchange
  // Signature: ASEF (4 bytes)
  // Version: 1.0 (4 bytes: 0x00 0x01 0x00 0x00)
  // Block count (4 bytes)
  // Blocks: type(2) + length(4) + name(UTF-16BE + null) + color data

  const encoder = new TextEncoder();
  const blocks = [];

  // Group start
  const groupName = 'Gold Gradient';
  const groupNameUTF16 = str2utf16be(groupName);
  const groupBlock = buildASEBlock(0xC001, groupNameUTF16, null);
  blocks.push(groupBlock);

  stops.forEach((hex, i) => {
    const name = `Gold ${i+1} ${hex}`;
    const nameUTF16 = str2utf16be(name);
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    const colorData = buildRGBColorData(r, g, b);
    blocks.push(buildASEBlock(0x0001, nameUTF16, colorData));
  });

  // Group end
  blocks.push(buildASEBlock(0xC002, null, null));

  const totalLen = blocks.reduce((a,b) => a + b.length, 0);
  const buf = new Uint8Array(12 + totalLen);
  // ASEF
  buf[0]=0x41;buf[1]=0x53;buf[2]=0x45;buf[3]=0x46;
  // Version 1.0
  buf[4]=0x00;buf[5]=0x01;buf[6]=0x00;buf[7]=0x00;
  // Block count
  const blockCount = blocks.length;
  buf[8]=(blockCount>>24)&0xff;
  buf[9]=(blockCount>>16)&0xff;
  buf[10]=(blockCount>>8)&0xff;
  buf[11]=blockCount&0xff;

  let off = 12;
  blocks.forEach(b => { buf.set(b, off); off += b.length; });

  const blob = new Blob([buf], {type:'application/octet-stream'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gold-gradient.ase';
  a.click();
  URL.revokeObjectURL(url);
  showToast('ASE スウォッチをダウンロードしました');
}

function str2utf16be(str) {
  // Returns Uint8Array of UTF-16BE encoded string + null terminator
  const arr = [];
  for(let i=0;i<str.length;i++){
    const c = str.charCodeAt(i);
    arr.push((c>>8)&0xff, c&0xff);
  }
  arr.push(0,0); // null terminator
  return new Uint8Array(arr);
}

function buildRGBColorData(r, g, b) {
  // RGB\0 (4 bytes) + 3 floats (4 bytes each) + type (2 bytes: 0=global, 1=spot, 2=normal)
  const buf = new ArrayBuffer(14);
  const view = new DataView(buf);
  // 'RGB '
  view.setUint8(0, 0x52); view.setUint8(1, 0x47);
  view.setUint8(2, 0x42); view.setUint8(3, 0x20);
  view.setFloat32(4, r, false);
  view.setFloat32(8, g, false);
  view.setFloat32(12, b, false);
  // type: 2 = normal (appended after)
  // Actually type is 2 more bytes outside colorData in some readers
  return new Uint8Array(buf);
}

function buildASEBlock(type, nameUTF16, colorData) {
  // Block: type(2) + length(4) + [nameLength(2) + name(UTF16BE)] + [colorData + colorType(2)]
  let bodyLen = 0;
  if(nameUTF16) bodyLen += 2 + nameUTF16.length;
  if(colorData) bodyLen += colorData.length + 2; // +2 for color type

  const buf = new Uint8Array(6 + bodyLen);
  const view = new DataView(buf.buffer);

  view.setUint16(0, type, false);
  view.setUint32(2, bodyLen, false);

  let off = 6;
  if(nameUTF16) {
    const nameLen = nameUTF16.length / 2; // char count including null
    view.setUint16(off, nameLen, false);
    off += 2;
    buf.set(nameUTF16, off);
    off += nameUTF16.length;
  }
  if(colorData) {
    buf.set(colorData, off);
    off += colorData.length;
    view.setUint16(off, 2, false); // 2 = normal
    off += 2;
  }
  return buf;
}

function download(filename, text, mime) {
  const blob = new Blob([text], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Init
render();
</script>
